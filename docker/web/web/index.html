<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jamal's AI Lab</title>
  <link rel="stylesheet" href="style.css?v=25">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/DOMPurify/3.0.8/purify.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Auth Screen — shown when not logged in -->
  <div id="auth-screen">
    <div class="auth-container">
      <div class="auth-logo">&#129302;</div>
      <h1 class="auth-title">Jamal's AI Lab</h1>
      <p class="auth-sub" id="auth-sub">Sign in to continue</p>
      <div id="auth-msg" class="hidden"></div>

      <!-- Login Form -->
      <div id="auth-login">
        <div class="auth-field"><input type="text" id="login-user" placeholder="Username" autocomplete="username" autocapitalize="none"></div>
        <div class="auth-field"><input type="password" id="login-pass" placeholder="Password" autocomplete="current-password"></div>
        <button class="auth-btn auth-btn-primary" id="login-btn" onclick="authLogin()">Sign In</button>
        <p class="auth-switch">No account? <a href="#" onclick="showRegister();return false">Request Access</a></p>
      </div>

      <!-- Register Form -->
      <div id="auth-register" class="hidden">
        <div class="auth-field"><input type="text" id="reg-user" placeholder="Choose a username (3+ chars)" autocomplete="username" autocapitalize="none"></div>
        <div class="auth-field"><input type="password" id="reg-pass" placeholder="Password (10+ chars, upper, number, symbol)" autocomplete="new-password"></div>
        <div class="auth-field"><input type="password" id="reg-pass2" placeholder="Confirm password" autocomplete="new-password"></div>
        <button class="auth-btn auth-btn-primary" id="reg-btn" onclick="authRegister()">Request Access</button>
        <p class="auth-switch">Already have an account? <a href="#" onclick="showLogin();return false">Sign In</a></p>
      </div>
    </div>
  </div>

  <div id="app" class="hidden">
    <aside id="sidebar">
      <div class="sidebar-header">
        <button id="new-chat-btn" onclick="newChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>New Chat</span>
        </button>
        <button id="sidebar-close" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="sidebar-search"><input id="conv-search" type="text" placeholder="Search chats..." oninput="filterConversations()"></div>
      <nav id="conv-list"></nav>
      <div class="sidebar-footer">
        <span id="tool-count">0 tools</span>
        <span id="conn-status" class="status-dot" title="Checking..."></span>
      </div>
    </aside>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main id="main">
      <div id="error-banner" class="hidden"></div>
      <header id="topbar">
        <button id="menu-btn" onclick="toggleSidebar()" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div id="model-selector">
          <button id="model-btn" onclick="toggleModelMenu()">
            <span id="model-label">Loading models...</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="model-menu" class="dropdown hidden"></div>
        </div>
        <span id="model-caps"></span>
        <!-- Tools toggle -->
        <button id="tools-toggle" onclick="toggleTools()" title="Toggle MCP tools">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
          <span id="tools-label">Tools ON</span>
        </button>
        <div class="topbar-end"></div>
        <button id="topbar-logout" onclick="authLogout()" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </header>

      <!-- Model loading progress bar -->
      <div id="model-loading" class="hidden">
        <div class="loading-bar"><div class="loading-bar-progress"></div></div>
        <span id="loading-text">Loading model...</span>
      </div>

      <div id="content-area">
        <div id="welcome">
          <div class="welcome-inner">
            <div class="welcome-logo">&#129302;</div>
            <h1>Jamal's AI Lab</h1>
            <p class="welcome-sub">What can I help you with?</p>
            <!-- Personality selector -->
            <div id="personality-bar">
              <button id="personality-btn" onclick="togglePersonalityModal()">
                <span id="personality-icon"></span>
                <span id="personality-name">General Assistant</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
            </div>
            <div class="suggestions">
              <button class="suggestion" onclick="useSuggestion('Write a script to ')"><span class="suggestion-icon">&#128187;</span><span class="suggestion-label">Write code</span><span class="suggestion-desc">Scripts, functions, or programs</span></button>
              <button class="suggestion" onclick="useSuggestion('Explain how ')"><span class="suggestion-icon">&#128218;</span><span class="suggestion-label">Explain a concept</span><span class="suggestion-desc">Technical topics, clearly</span></button>
              <button class="suggestion" onclick="useSuggestion('Debug this issue: ')"><span class="suggestion-icon">&#128269;</span><span class="suggestion-label">Debug an issue</span><span class="suggestion-desc">Find and fix problems</span></button>
              <button class="suggestion" onclick="useSuggestion('Analyze this data: ')"><span class="suggestion-icon">&#128202;</span><span class="suggestion-label">Analyze data</span><span class="suggestion-desc">Parse, transform, summarize</span></button>
            </div>
          </div>
        </div>

        <!-- Personality picker modal -->
        <div id="personality-modal" class="modal-overlay hidden" onclick="if(event.target===this)closePersonalityModal()">
          <div class="modal-content">
            <div class="modal-header">
              <h2>Choose a Personality</h2>
              <button class="modal-close" onclick="closePersonalityModal()">&times;</button>
            </div>
            <div class="modal-search">
              <input id="personality-search" type="text" placeholder="Search personalities..." oninput="filterPersonalities()">
            </div>
            <div id="personality-categories"></div>
            <div class="modal-custom">
              <button id="custom-prompt-toggle" onclick="toggleCustomPrompt()">
                <span>&#9998;</span> Write your own prompt
              </button>
              <div id="custom-prompt-area" class="hidden">
                <textarea id="custom-prompt-input" rows="6" placeholder="Enter your custom system prompt..."></textarea>
                <button id="custom-prompt-apply" onclick="applyCustomPrompt()">Apply Custom Prompt</button>
              </div>
            </div>
          </div>
        </div>
        <div id="chat-view" class="hidden"><div id="messages"></div></div>
      </div>

      <div id="input-box">
        <input type="file" id="file-input" multiple onchange="handleFiles(this)" class="hidden" accept="image/*,.txt,.py,.js,.ts,.json,.md,.csv,.yaml,.yml,.xml,.html,.css,.sh,.bash,.dart,.go,.rs,.java,.c,.cpp,.h,.hpp,.rb,.php,.sql,.toml,.cfg,.conf,.log">
        <div id="attachments" class="hidden"></div>
        <div id="input-row">
          <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach files">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <textarea id="input" rows="1" placeholder="Message AI Lab..." onkeydown="handleKey(event)" oninput="handleInput()"></textarea>
          <button id="action-btn" onclick="handleAction()" disabled title="Send message">
            <svg id="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            <svg id="icon-stop" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" class="hidden"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </div>
        <div id="input-meta"><span id="model-badge"></span></div>
      </div>
    </main>
  </div>
  <script src="app.js?v=21"></script>
</body>
</html>
