# Port binding overlay — use this for local development and production:
#   docker compose -f docker-compose.yml -f docker-compose.ports.yml up -d
#
# CI smoke tests use docker-compose.yml alone (no host port binding),
# running all tests inside the compose network via service hostnames.
services:
  aichat-db:
    ports:
      - "${AICHAT_DB_BIND:-127.0.0.1}:5432:5432"

  aichat-vector:
    ports:
      - "6333:6333"
      - "6334:6334"

  aichat-data:
    ports:
      - "8091:8091"

  aichat-vision:
    ports:
      - "8099:8099"

  aichat-docs:
    ports:
      - "8101:8101"

  aichat-sandbox:
    ports:
      - "8095:8095"

  aichat-searxng:
    ports:
      - "8098:8080"

  aichat-mcp:
    ports:
      - "8096:8096"

  aichat-whatsapp:
    ports:
      - "8097:8097"
