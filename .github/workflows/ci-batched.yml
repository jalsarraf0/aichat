name: Regression CI (Batched)

on:
  pull_request:
  push:
    branches: ["main", "dev"]
  workflow_dispatch:

concurrency:
  group: aichat-regression-batched-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regression:
    name: Regression (${{ matrix.batch.name }})
    runs-on: [self-hosted, Linux, X64, docker]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      AICHAT_TRANSCRIPT_PATH: ${{ github.workspace }}/.tmp/transcript-${{ matrix.batch.name }}.jsonl
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        batch:
          - name: core
            paths: "tests/test_tui.py tests/test_tool_args.py tests/test_tool_scheduler.py tests/test_toolkit.py tests/test_tools_e2e.py tests/test_streaming.py tests/test_thinking.py tests/test_ssh_keys.py tests/test_sanitizer.py tests/test_keybinds.py tests/test_cli_mcp_server.py"
          - name: compaction
            paths: "tests/test_compaction.py tests/test_compaction_enhancements.py tests/test_conversation_db.py"
          - name: services
            paths: "tests/test_database_tools.py tests/test_orchestrate.py tests/test_browser_gpu.py tests/test_image_pipeline.py tests/test_image_rendering.py tests/test_face_recognition.py tests/test_new_services.py tests/test_finetuning.py"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run batched regression tests
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${AICHAT_TRANSCRIPT_PATH}")"
          pytest -q -m "not smoke" ${{ matrix.batch.paths }}
