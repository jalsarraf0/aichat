name: Vision Stack CI

on:
  push:
    paths:
      - "vision/**"
      - ".github/workflows/vision-ci.yml"
  pull_request:
    paths:
      - "vision/**"
      - ".github/workflows/vision-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint (ruff)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install linting dependencies
        run: |
          uv pip install --system \
            ruff \
            mypy \
            pydantic \
            pydantic-settings \
            fastapi \
            httpx \
            Pillow \
            numpy

      - name: Run ruff linter on mcp-server
        run: ruff check vision/mcp-server/app

      - name: Run ruff linter on vision-router
        run: ruff check vision/services/vision-router/app

      - name: Run mypy type checker on mcp-server
        run: mypy vision/mcp-server/app --ignore-missing-imports

      - name: Run mypy type checker on vision-router
        run: mypy vision/services/vision-router/app --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Security scan (bandit + TruffleHog)
  # ---------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # TruffleHog needs full history

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install bandit
        run: uv pip install --system bandit

      - name: Run bandit on mcp-server
        run: |
          bandit -r vision/mcp-server/app -ll \
            --skip B101 \
            -f txt

      - name: Run bandit on vision-router
        run: |
          bandit -r vision/services/vision-router/app -ll \
            --skip B101 \
            -f txt

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: vision/
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ---------------------------------------------------------------------------
  # Unit tests (no services required)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install test dependencies
        run: |
          uv pip install --system \
            pytest \
            pytest-asyncio \
            pydantic \
            pydantic-settings \
            fastapi \
            httpx \
            Pillow \
            numpy \
            scipy

      - name: Run unit tests
        working-directory: vision
        run: python -m pytest tests/unit -v --tb=short --no-header

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: vision/.pytest_cache/

  # ---------------------------------------------------------------------------
  # Build Docker images (validates Dockerfiles)
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build MCP server image
        uses: docker/build-push-action@v5
        with:
          context: vision/mcp-server
          file: vision/mcp-server/Dockerfile
          push: false
          tags: vision-mcp:ci-${{ github.sha }}
          cache-from: type=gha,scope=vision-mcp
          cache-to: type=gha,scope=vision-mcp,mode=max

      - name: Build vision router image
        uses: docker/build-push-action@v5
        with:
          context: vision/services/vision-router
          file: vision/services/vision-router/Dockerfile
          push: false
          tags: vision-router:ci-${{ github.sha }}
          cache-from: type=gha,scope=vision-router
          cache-to: type=gha,scope=vision-router,mode=max

  # ---------------------------------------------------------------------------
  # SBOM generation (runs after successful build)
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM for mcp-server
        uses: anchore/sbom-action@v0
        with:
          path: vision/mcp-server
          artifact-name: sbom-vision-mcp.spdx.json
          format: spdx-json

      - name: Generate SBOM for vision-router
        uses: anchore/sbom-action@v0
        with:
          path: vision/services/vision-router
          artifact-name: sbom-vision-router.spdx.json
          format: spdx-json

      - name: Grype vulnerability scan on mcp-server SBOM
        uses: anchore/scan-action@v3
        with:
          sbom: sbom-vision-mcp.spdx.json
          fail-build: false
          severity-cutoff: high

      - name: Grype vulnerability scan on vision-router SBOM
        uses: anchore/scan-action@v3
        with:
          sbom: sbom-vision-router.spdx.json
          fail-build: false
          severity-cutoff: high
