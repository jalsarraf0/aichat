name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build-binaries:
    name: Build Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build standalone binary
        run: pyinstaller --onefile --name aichat src/aichat/__main__.py

      - name: Bundle artifact (Unix)
        if: runner.os != 'Windows'
        run: tar -czf "aichat-${RELEASE_TAG}-${{ runner.os }}-x64.tar.gz" -C dist aichat

      - name: Bundle artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/aichat.exe -DestinationPath "aichat-$env:RELEASE_TAG-${{ runner.os }}-x64.zip"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ runner.os }}
          path: |
            *.tar.gz
            *.zip

  build-python-dist:
    name: Build Python Dist
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload python dist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-python-dist]

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## Release Assets
          - Standalone binaries for Linux, macOS, and Windows
          - Python source distribution (`sdist`)
          - Python wheel (`.whl`)
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release-assets/**/*
          body_path: RELEASE_NOTES.md
