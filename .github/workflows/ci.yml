  id-token: write
  attestations: write
  security-events: write
concurrency:
  group: aichat-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, unified-all]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        shell: bash
        timeout-minutes: 10
        run: pip3 install --break-system-packages -r requirements.txt -r requirements-dev.txt 2>/dev/null || pip3 install --break-system-packages -r requirements.txt
      - name: Lint (ruff)
        shell: bash
        timeout-minutes: 5
        run: ruff check .
  test:
    name: Test
    runs-on: [self-hosted, unified-all]
    needs: lint
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache ~/.cache/pip
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          path: ~/.cache/pip
          restore-keys: ${{ runner.os }}-pip-

      - name: Architecture tests
        shell: bash
        timeout-minutes: 15
        run: pytest -v tests/test_architecture.py
  security:
    name: Security
    runs-on: [self-hosted, unified-all]
    needs: lint
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Secrets scan (gitleaks)
        shell: bash
        timeout-minutes: 10
        run: gitleaks detect --source=. --no-banner --exit-code=1
      - name: Bandit SAST
        shell: bash
        continue-on-error: true
        timeout-minutes: 10
        run: bandit -r . -lll
      - name: Pip audit
        shell: bash
        timeout-minutes: 10
        run: pip-audit -r requirements.txt --progress-spinner off
      - name: ShellCheck
        shell: bash
        continue-on-error: true
        timeout-minutes: 10
        run: find . -name '*.sh' -type f | xargs shellcheck --severity=warning
      - name: Trivy filesystem scan
        shell: bash
        timeout-minutes: 15
        run: trivy fs --severity HIGH,CRITICAL --exit-code 1 .
      - name: Grype vulnerability scan
        shell: bash
        timeout-minutes: 15
        run: |
          grype dir:. --fail-on high
      - name: Semgrep SAST
        shell: bash
        continue-on-error: true
        timeout-minutes: 15
        run: semgrep --config=auto --error .
  sbom:
    name: SBOM
    runs-on: [self-hosted, unified-all]
    needs: test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate SBOM (syft)
        shell: bash
        timeout-minutes: 10
        run: |
          syft dir:. -o spdx-json=sbom-spdx.json -o cyclonedx-json=sbom-cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-*.json
          retention-days: 90
  docker:
