name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write      # push images (optional registry)
  id-token: write      # OIDC for cosign attestation

# ---------------------------------------------------------------------------
# Global env
# ---------------------------------------------------------------------------
env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  COMPOSE_PROJECT_NAME: aichat-ci-${{ github.run_id }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Static analysis — no Docker, runs in seconds
  # ──────────────────────────────────────────────────────────────────────────
  static:
    name: Static Analysis
    runs-on: [self-hosted, Linux, X64, docker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff

      - name: Lint (ruff)
        run: ruff check docker/ src/ tests/

      - name: Architecture contract tests (no Docker)
        run: pytest tests/test_architecture.py -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Core regression tests — ephemeral containers per batch
  # ──────────────────────────────────────────────────────────────────────────
  regression:
    name: Regression / ${{ matrix.batch.name }}
    runs-on: [self-hosted, Linux, X64, docker]
    timeout-minutes: 30
    needs: static
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        batch:
          - name: core
            paths: >-
              tests/test_tui.py
              tests/test_tool_args.py
              tests/test_tool_scheduler.py
              tests/test_toolkit.py
              tests/test_streaming.py
              tests/test_thinking.py
              tests/test_ssh_keys.py
              tests/test_sanitizer.py
              tests/test_keybinds.py
              tests/test_cli_mcp_server.py
          - name: compaction
            paths: >-
              tests/test_compaction.py
              tests/test_compaction_enhancements.py
              tests/test_conversation_db.py
          - name: services
            paths: >-
              tests/test_database_tools.py
              tests/test_orchestrate.py
              tests/test_browser_gpu.py
              tests/test_image_pipeline.py
              tests/test_image_rendering.py
              tests/test_face_recognition.py
              tests/test_new_services.py
              tests/test_finetuning.py
          - name: batch-jobs
            paths: >-
              tests/test_batch_jobs.py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ${{ matrix.batch.name }} tests
        run: pytest -q -m "not smoke" ${{ matrix.batch.paths }}

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Build all service images — ephemeral Docker build per service
  #    Uses the :cache tag from the previous run to speed up layer reuse.
  #    After a successful build the :cache tag is updated for future runs.
  #    The :ci-<sha> ephemeral tag is removed in the cleanup job.
  # ──────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build / ${{ matrix.service }}
    runs-on: [self-hosted, Linux, X64, docker]
    timeout-minutes: 45
    needs: static
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        service:
          - aichat-data
          - aichat-vision
          - aichat-docs
          - aichat-sandbox
          - aichat-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Build ${{ matrix.service }} image (with layer cache)
        run: |
          SERVICE=${{ matrix.service }}
          # Map service name → build context directory
          case "$SERVICE" in
            aichat-data)    DIR=docker/data    ;;
            aichat-vision)  DIR=docker/vision  ;;
            aichat-docs)    DIR=docker/docs    ;;
            aichat-sandbox) DIR=docker/sandbox ;;
            aichat-mcp)     DIR=docker/mcp     ;;
          esac
          # Pull the previous :cache image to warm Docker layer cache
          docker pull "${SERVICE}:cache" 2>/dev/null || true
          docker build \
            --cache-from "${SERVICE}:cache" \
            --tag "${SERVICE}:ci-${{ github.sha }}" \
            --tag "${SERVICE}:cache" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            "$DIR"
          # :cache tag persists on this runner for future runs.
          # :ci-<sha> ephemeral tag is removed by the cleanup job after CI.

      - name: Save image tarball (for SBOM job)
        run: |
          docker save "${{ matrix.service }}:ci-${{ github.sha }}" \
            | gzip > "${{ matrix.service }}.tar.gz"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: ${{ matrix.service }}.tar.gz
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Smoke test the full consolidated stack
  # ──────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests (Full Stack)
    runs-on: [self-hosted, Linux, X64, docker]
    timeout-minutes: 20
    needs: [regression, build-images]
    env:
      COMPOSE_PROJECT_NAME: aichat-smoke-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps
        run: pip install httpx pytest

      - name: Start consolidated stack
        run: |
          docker compose up -d --build \
            aichat-db aichat-vector aichat-data aichat-vision aichat-docs aichat-sandbox aichat-searxng
          # Wait for data service (slowest — needs PostgreSQL)
          for i in $(seq 1 24); do
            curl -sf http://localhost:8091/health && break
            echo "Waiting for aichat-data ($i/24)…"; sleep 5
          done

      - name: Start MCP gateway
        run: docker compose up -d aichat-mcp

      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v -m smoke --tb=short

      - name: Run architecture tests against live stack
        run: pytest tests/test_architecture.py -v --tb=short

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Package build
  # ──────────────────────────────────────────────────────────────────────────
  package:
    name: Package Build
    runs-on: [self-hosted, Linux, X64, docker]
    timeout-minutes: 20
    needs: regression
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Build standalone binary
        run: |
          pip install . pyinstaller
          pyinstaller --onefile --name aichat src/aichat/__main__.py

      - name: Bundle artifact
        run: tar -czf "aichat-${{ runner.os }}-x64-${{ github.sha }}.tar.gz" -C dist aichat

      - uses: actions/upload-artifact@v4
        with:
          name: aichat-${{ runner.os }}-x64
          path: "*.tar.gz"

  # ──────────────────────────────────────────────────────────────────────────
  # 6. SBOM — per service, after images are built
  # ──────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM / ${{ matrix.service }}
    runs-on: [self-hosted, Linux, X64, docker]
    timeout-minutes: 15
    needs: build-images
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        service:
          - aichat-data
          - aichat-vision
          - aichat-docs
          - aichat-sandbox
          - aichat-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}

      - name: Load image
        run: docker load < "${{ matrix.service }}.tar.gz"

      - name: Generate SBOM (SPDX + CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: "${{ matrix.service }}:ci-${{ github.sha }}"
          artifact-name: "sbom-${{ matrix.service }}"
          format: spdx-json
          output-file: "sbom-${{ matrix.service }}.spdx.json"

      - name: Generate CycloneDX SBOM
        run: |
          # Install syft if not available
          if ! command -v syft &>/dev/null; then
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
              | sh -s -- -b /usr/local/bin
          fi
          syft "${{ matrix.service }}:ci-${{ github.sha }}" \
            -o cyclonedx-json \
            > "sbom-${{ matrix.service }}.cyclonedx.json"

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: "sbom-${{ matrix.service }}.*"
          retention-days: 30

      - name: Vulnerability scan (grype)
        run: |
          if ! command -v grype &>/dev/null; then
            curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
              | sh -s -- -b /usr/local/bin
          fi
          grype "sbom:sbom-${{ matrix.service }}.spdx.json" \
            --fail-on high \
            --output table \
            || echo "::warning::Vulnerabilities found in ${{ matrix.service }} — review SBOM artifact"

  # ──────────────────────────────────────────────────────────────────────────
  # 7. Cleanup — remove ephemeral :ci-<sha> image tags from the runner.
  #    The :cache tags are KEPT so the next push can reuse Docker layers.
  #    Runs on every push, even if earlier jobs fail.
  # ──────────────────────────────────────────────────────────────────────────
  cleanup:
    name: Cleanup Ephemeral Images
    runs-on: [self-hosted, Linux, X64, docker]
    timeout-minutes: 5
    if: always()
    needs: [smoke, sbom, package]
    steps:
      - name: Remove ephemeral ci-<sha> image tags (keep :cache)
        run: |
          SERVICES="aichat-data aichat-vision aichat-docs aichat-sandbox aichat-mcp"
          for svc in $SERVICES; do
            echo "Removing ${svc}:ci-${{ github.sha }} ..."
            docker rmi "${svc}:ci-${{ github.sha }}" 2>/dev/null || true
          done
          echo "Cache images retained for next run:"
          for svc in $SERVICES; do
            docker image inspect "${svc}:cache" --format "  ${svc}:cache — {{.Id}}" 2>/dev/null || true
          done
          # Prune dangling layers (untagged intermediates) — safe, never removes :cache
          docker image prune -f
