name: Regression CI/CD

on:
  push:
    branches: ["main", "dev"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Regression (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full regression tests
        run: pytest tests/ -v --tb=short

  package:
    name: Package Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: regression
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build standalone binary
        run: pyinstaller --onefile --name aichat src/aichat/__main__.py

      - name: Bundle artifact
        run: tar -czf "aichat-${{ runner.os }}-x64-${{ github.sha }}.tar.gz" -C dist aichat

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: aichat-${{ runner.os }}-x64
          path: |
            *.tar.gz

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: regression

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run bandit (SAST)
        run: bandit -r src/ -ll -q

      - name: Check dependencies for known vulnerabilities
        run: pip-audit .
